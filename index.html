<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giới thiệu Mai Linh</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(120deg, #f6d365, #fda085);
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }
        img {
            width: 150px;
            border-radius: 50%;
            margin-bottom: 20px;
        }
        h1 {
            margin-bottom: 10px;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
        }
        .social a {
            margin: 0 10px;
            text-decoration: none;
            color: #f76c6c;
            font-weight: bold;
        }
        .social a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="https://via.placeholder.com/150" alt="Avatar">
    <h1>Xin chào, mình là Mai Linh 👋</h1>
    <p>
        Mình là một người yêu thích công nghệ và thiết kế web. 
        Mình đang học lập trình và xây dựng các dự án cá nhân để phát triển kỹ năng.
    </p>

    <p>
        💡 Sở thích: Coding, nghe nhạc, du lịch  
        🚀 Mục tiêu: Trở thành một lập trình viên chuyên nghiệp
    </p>

    <div class="social">
        <a href="#">Facebook</a>
        <a href="#">Instagram</a>
        <a href="#">GitHub</a>
    </div>
</div>

</body>
</html>
